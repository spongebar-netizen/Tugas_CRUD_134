<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen User - Praktikum 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body class="container mt-5">

<h2 class="mb-4">Daftar ktp</h2>

<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title" id="formTitle">Tambah Ktp</h5>
        <form id="userForm">
            <input type="hidden" id="userId">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Nomor KTP</label>
                    <input type="number" id="ktpNomor" class="form-control" placeholder="Contoh: 6767676767" minlength="10" maxlength="12" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Nama lengkap</label>
                    <input type="text" id="userName" class="form-control" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Alamat</label>
                    <input type="text" id="Alamat" class="form-control" placeholder="Contoh: Jalan Sleman no.ts rt.pmo" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" id="tanggalLahir" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Jenis Kelamin</label>

                    <div>
                        <input type="radio" name="jk" value="Laki-laki" id="jkLaki">
                        <label for="jkLaki">Laki-laki</label>
                    </div>

                    <div>
                        <input type="radio" name="jk" value="Perempuan" id="jkPrempuan">
                        <label for="jkPrempuan">Perempuan</label>
                    </div>

                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Simpan Data</button>
                    <button type="button" id="btnCancel" class="btn btn-secondary ms-2" style="display:none;" onclick="resetForm()">Batal</button>
                </div>
            </div>
        </form>
    </div>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nomor KTP</th>
        <th>Nama Lengkap</th>
        <th>Alamat</th>
        <th>Tanggal Lahir</th>
        <th>Jenis Kelamin</th>
        <th>Aksi</th>
    </tr>
    </thead>
    <tbody id="ktpTableBody"></tbody>
</table>

<script>
    const apiUrl = '/api/ktp';
    let isUpdate = false;

    $(document).ready(function() {
        const today = new Date().toISOString().split("T")[0];
        document.getElementById("tanggalLahir").setAttribute("max", today);
        document.getElementById("tanggalLahir").setAttribute("min", "1900-01-01");
        loadUsers();

        $('#userForm').submit(function(e) {
            e.preventDefault();

            const userData = {
                nomorKtp: $('#ktpNomor').val(),
                namaLengkap: $('#userName').val(),
                alamat: $('#Alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('input[name="jk"]:checked').val()
            };

            if (isUpdate) {
                const id = $('#userId').val();
                updateUser(id, userData);
            } else {
                addUser(userData);
            }
        });
    });

    // 1. Ambil Semua Data (GET)
    function loadUsers() {
        $.get(apiUrl, function(response) {
            let rows = '';

            response.data.forEach(user => {
                rows += `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.nomorKtp}</td>
                    <td>${user.namaLengkap}</td>
                    <td>${user.alamat}</td>
                    <td>${user.tanggalLahir}</td>
                    <td>${user.jenisKelamin}</td>
                    <td>
                        <button class="btn btn-warning btn-sm"
                        onclick="editUser('${user.id}','${user.nomorKtp}','${user.namaLengkap}','${user.alamat}','${user.tanggalLahir}','${user.jenisKelamin}')">
                        Edit</button>

                        <button class="btn btn-danger btn-sm"
                        onclick="deleteUser('${user.id}')">
                        Hapus</button>
                    </td>
                </tr>
            `;
            });

            $('#ktpTableBody').html(rows);
        });
    }

    // 2. Tambah Data (POST)
    function addUser(data) {
        $.ajax({
            url: apiUrl,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                resetForm();
                loadUsers();
                alert('Ktp berhasil ditambahkan (ID Otomatis)');
            },
            error: function() {
                alert('Gagal menambah user.');
            }
        });
    }

    // 3. Update Data (PUT)
    function updateUser(id, data) {
        $.ajax({
            url: `${apiUrl}/${id}`,
            type: 'PUT',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function() {
                resetForm();
                loadUsers();
                alert('Data berhasil diperbarui!');
            },
            error: function() {
                alert('Gagal memperbarui Ktp.');
            }
        });
    }

    // 4. Hapus Data (DELETE)
    function deleteUser(id) {
        if(confirm('Apakah Anda yakin ingin menghapus Ktp ini?')) {
            $.ajax({
                url: `${apiUrl}/${id}`,
                type: 'DELETE',
                success: function() {
                    loadUsers();
                    alert('Ktp telah dihapus.');
                }
            });
        }
    }

    // Helper: Masuk ke Mode Edit
    function editUser(id, nomorKtp, namaLengkap, alamat, tanggalLahir, jenisKelamin) {

        $('#userId').val(id);
        $('#ktpNomor').val(nomorKtp);
        $('#userName').val(namaLengkap);
        $('#Alamat').val(alamat);
        $('#tanggalLahir').val(tanggalLahir);

        if(jenisKelamin === "Laki-laki"){
            $('#jkLaki').prop('checked', true);
        } else {
            $('#jkPrempuan').prop('checked', true);
        }

        $('#formTitle').text('Edit KTP');
        $('#btnSubmit').text('Update Data')
            .removeClass('btn-primary')
            .addClass('btn-success');

        $('#btnCancel').show();
        isUpdate = true;
    }

    // Helper: Reset Form ke Mode Tambah
    function resetForm() {

        $('#userId').val('');
        $('#ktpNomor').val('');
        $('#userName').val('');
        $('#Alamat').val('');
        $('#tanggalLahir').val('');
        $('input[name="jk"]').prop('checked', false);

        $('#formTitle').text('Tambah KTP');
        $('#btnSubmit').text('Simpan Data')
            .removeClass('btn-success')
            .addClass('btn-primary');

        $('#btnCancel').hide();
        isUpdate = false;
    }

</script>
</body>
</html>
